<!-- Declaración de tipo de documento: HTML5 -->
<!DOCTYPE html>
<!-- Elemento raíz del documento HTML con idioma español -->
<html lang="es">
<head>
  <!-- Define la codificación de caracteres como UTF-8 (soporte para caracteres especiales) -->
  <meta charset="UTF-8" />
  <!-- Configuración del viewport para mostrar correctamente en dispositivos móviles -->
  <!-- initial-scale=1.0: escala inicial 100%, maximum-scale=1.0: evita zoom, user-scalable=no: deshabilita zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- Color de la barra de dirección del navegador en Android -->
  <meta name="theme-color" content="#F9FAFE" />
  <!-- Permite que la app web se muestre en pantalla completa en dispositivos Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- Estilo de la barra de estado en iOS (default = negra, black-translucent = negra transparente) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- Nombre que aparece cuando se agrega a la pantalla de inicio en iOS -->
  <meta name="apple-mobile-web-app-title" content="TIU Virtual" />
  <!-- Enlace al archivo de configuración de la aplicación web (para PWA) -->
  <link rel="manifest" href="manifest.json" />
  <!-- Título que aparece en la pestaña del navegador -->
  <title>TIU Virtual</title>
  <!-- Sección de estilos CSS para toda la página -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════*/
    /* RESETEO GLOBAL: Elimina márgenes, rellenos y estilos por defecto */
    /* ═══════════════════════════════════════════════════════════════*/
    * { 
      margin: 0;                              /* Sin margen externo */
      padding: 0;                             /* Sin relleno interno */
      box-sizing: border-box;                 /* El tamaño incluye bordes y relleno */
      -webkit-tap-highlight-color: transparent; /* Elimina resaltado al tocar en iOS */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* VARIABLES CSS (colores reutilizables) */
    /* ═══════════════════════════════════════════════════════════════*/
    :root {
      --red:      #c62828;           /* Rojo oscuro para acentos */
      --dark:     #1a1a2e;           /* Gris muy oscuro casi negro */
      --bg:       #F9FAFE;           /* Azul muy claro para fondo */
      --cloud:    rgba(199, 207, 254, 0.55);  /* Púrpura claro con opacidad para nubes */
      --grey:     #9e9e9e;           /* Gris mediano para texto secundario */
      --navy:     #2B3945;           /* Azul oscuro para títulos */
      --clock-bg: #DBD9FF;  /* Púrpura claro para fondo del reloj */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* ESTILOS DEL DOCUMENTO HTML Y BODY */
    /* ═══════════════════════════════════════════════════════════════*/
    html, body {
      margin: 0; padding: 0;         /* Sin espacios alrededor */
      width: 100%;                   /* Ancho 100% ventana */
      height: 100%;                  /* Alto 100% ventana */
      background: var(--bg);         /* Fondo azul claro */
      font-family: Arial, Helvetica, sans-serif; /* Tipografía segura */
      overflow: hidden;              /* Oculta barras de desplazamiento */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* CONTENEDOR PRINCIPAL DE LA APP */
    /* ═══════════════════════════════════════════════════════════════*/
    .app {
      width: 100%;                   /* Ancho completo */
      height: 100dvh;                /* Altura 100% viewport dinámico (ajusta con navegación móvil) */
      background: var(--bg);         /* Fondo de la app */
      display: flex;                 /* Activar flexbox */
      flex-direction: column;         /* Elementos en columna (vertical) */
      align-items: center;           /* Centrar elementos horizontalmente */
      padding: 20px 22px 20px;       /* Relleno: 20px arriba, 22px lado, 20px abajo */
      position: relative;            /* Permite posicionamiento absoluto en hijos */
      overflow: hidden;              /* Oculta contenido que se desborda */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* NUBES DECORATIVAS (elemento de fondo) */
    /* ═══════════════════════════════════════════════════════════════*/
    .clouds { 
      position: absolute;            /* Posición fija en la pantalla */
      inset: 0;                      /* Llena todo el contenedor (top:0, right:0, bottom:0, left:0) */
      pointer-events: none;          /* Las nubes no reciben eventos del ratón */
    }
    
    .cloud {
      position: absolute;            /* Posiciona cada nube independientemente */
      background: var(--cloud);      /* Color púrpura claro */
      border-radius: 999px;          /* Esquinas muy redondeadas (forma ovalada) */
    }
    
    /* Posiciones individuales de cada nube */
    .c1 { width: 55px; height: 18px; top: 42%; left: 4px; }
    .c2 { width: 75px; height: 26px; top: 38%; right: 8px; }
    .c3 { width: 48px; height: 15px; top: 44%; right: 68px; }
    .c4 { width: 90px; height: 20px; top: 58%; left: -8px; opacity:.45; }     /* Opacidad 45% para más profundidad */
    .c5 { width: 62px; height: 18px; top: 56%; right: -4px; opacity:.4; }     /* Opacidad 40% */

    /* ═══════════════════════════════════════════════════════════════*/
    /* BARRA SUPERIOR (APP BAR) - FIJA ARRIBA */
    /* ═══════════════════════════════════════════════════════════════*/
    .app-bar {
      width: 100%;                   /* Ancho completo */
      display: flex;                 /* Usa flexbox */
      align-items: center;           /* Centra elementos verticalmente */
      flex-shrink: 0;                /* No se encoge (prioritario) */
      margin-bottom: 0;              /* Sin margen inferior */
    }
    
    /* Botón de retroceso (flecha) */
    .back-btn { 
      background: none;              /* Sin fondo */
      border: none;                  /* Sin borde */
      cursor: pointer;               /* Cursor de mano al pasar */
      padding: 4px 8px 4px 0;        /* Relleno interno */
      display: flex;                 /* Flexbox para alinear SVG */
      align-items: center;           /* Centra el SVG */
    }
    
    /* SVG dentro del botón */
    .back-btn svg { 
      width: 30px;                   /* Ancho del ícono */
      height: 30px;                  /* Alto del ícono */
    }
    
    /* Título H1 en la barra superior */
    .app-bar h1 { 
      font-size: 18px;               /* Tamaño de título */
      font-weight: 545;              /* Peso ultra-bold (más grueso) */
      font-family: 'League Gothic', 'Bebas Neue', sans-serif; 
      letter-spacing: 1px;
      color: var(--dark);            /* Color gris muy oscuro */
      padding: 3px 0;
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* ZONA CENTRAL QUE CRECE DINÁMICAMENTE */
    /* ═══════════════════════════════════════════════════════════════*/
    .content {
      flex: 1;                       /* Ocupa el espacio restante disponible */
      display: flex;                 /* Flexbox */
      flex-direction: column;         /* Elementos apilados verticalmente */
      align-items: center;           /* Centrados horizontalmente */
      justify-content: space-evenly; /* Distribuye elementos equitativamente */
      width: 100%;                   /* Ancho completo */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* CAJA DEL RELOJ (HORA Y FECHA) */
    /* ═══════════════════════════════════════════════════════════════*/
    .clock-box {
      margin-top: 19px;              /* Margen superior 15px */
      background: var(--clock-bg);   /* Fondo púrpura claro */
      border-radius: 8px;            /* Esquinas redondeadas 8px */
      padding: 10px 24px;            /* Relleno: 10px arriba/abajo, 28px lado */
      
      text-align: center;            /* Texto centrado */
    }
    
    /* Hora (valores grandes) */
    .clock-time {
      font-size: 38px;               /* Tamaño grande */
      font-weight: normal;              /* Semi-bold */
      color: #000001;                /* Negro puro */
      font-family: 'Arimo', Arial, sans-serif;
      letter-spacing: 1px;           /* Espaciado entre dígitos */
    }
    
    /* Fecha (más pequeña y gris) */
    .clock-date {
      font-size: 17px;               /* Tamaño pequeño */
      font-weight: 450;              /* Semi-bold */
      color: #63666A;                /* Gris oscuro */
      margin-top: 6px;               /* Margen superior 16px */
      font-family: 'Arimo', Arial, sans-serif;
      text-align: center;            /* Centrado */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* FOTO DE PERFIL CIRCULAR */
    /* ═══════════════════════════════════════════════════════════════*/
    .photo-wrap {
      margin-top: 35px;
      width: 115px;                  /* Ancho 200px */
      height: 115px;                 /* Alto 200px (cuadrado) */
      border-radius: 50%;            /* 50% = círculo perfecto */
      overflow: hidden;              /* Recorta contenido que sobresale */
      flex-shrink: 0;                /* No se encoge */
    }
    
    /* Imagen dentro de la foto */
    .photo-wrap img { 
      width: 100%;                   /* Llena todo el ancho */
      height: 100%;                  /* Llena todo el alto */
      object-fit: cover;             /* Recorta mantiene proporción (zoom) */
      display: block;                /* Bloque (sin espacios) */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* TARJETA BLANCA CON INFORMACIÓN DEL PERFIL */
    /* ═══════════════════════════════════════════════════════════════*/
    .card {
      margin-top: 65px;              /* Margen superior 20px */
      background: #fff;              /* Fondo blanco */
      border-radius: 22px;           /* Esquinas muy redondeadas */
      width: 100%;                   /* Ancho completo */
      max-width: 340px;              /* Ancho máximo 340px */
      padding: 20px 28px 22px;       /* Relleno interno */
      box-shadow: 0 8px 24px rgba(0,0,0,0.11); /* Sombra suave */
      display: flex;                 /* Flexbox */
      flex-direction: column;         /* Elementos en columna */
      align-items: center;           /* Centrados */
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* LÍNEAS DE NOMBRE EN LA TARJETA */
    /* ═══════════════════════════════════════════════════════════════*/
    .name-line {
      font-size: 40px;               /* Tamaño de nombre */
      font-weight: normal;              /* Ultra-bold */
      color: #E50A17;             /* Rojo oscuro */
      line-height: 1.2;              /* Altura de línea */
      text-align: center;            /* Centrado */
      font-family: 'League Gothic', 'Bebas Neue', sans-serif; 
      letter-spacing: 1px;
    }

    /* ═══════════════════════════════════════════════════════════════*/
    /* ITEMS DE DATOS (etiqueta + valor) */
    /* ═══════════════════════════════════════════════════════════════*/
    .dato { 
      display: flex;                 /* Flexbox */
      flex-direction: column;         /* Elementos en columna */
      align-items: center;           /* Centrados */
      
    }
    
    /* Etiqueta del dato (pequeña y gris) */
    .dato-label { 
      margin-top: 5px;
      font-size: 15px;               /* Muy pequeña */
      color: #6c7c99;            /* Gris */
      font-weight: 625;              /* Semi-bold */
    }
    
    /* Valor del dato (grande y oscuro) */
    .dato-valor { 
      margin-top: 6px;
      font-size: 18px;               /* Tamaño grande */
      font-weight: 900;              /* Ultra-bold */
      color: #3B4B62;            /* Gris muy oscuro */
      font-family: 'Arimo', Arial, sans-serif;
      line-height: 1;              /* Alto de línea */
      
    }

    /* ═════════════════════════════════════════════════════════════════*/
    /* NOMBRE DE CARRERA */
    /* ═════════════════════════════════════════════════════════════════*/
    .carrera-text { 
      font-size: 17px;               /* Tamaño mediano */
      font-weight: 750;              /* Ultra-bold */
      color: #3B4B62;            /* Azul oscuro */
      text-align: center;            /* Centrado */
      margin-top: 23px;              /* Margen superior */
    }

    /* ═════════════════════════════════════════════════════════════════*/
    /* FILA CON UBICACIÓN (ICONO + TEXTO) */
    /* ═════════════════════════════════════════════════════════════════*/
    .campus-row { 
      display: flex;                 /* Flexbox horizontal */
      align-items: center;           /* Centra verticalmente */
      gap: 5px;                      /* Espacio entre icono y texto */
      margin-top: 8px;              /* Margen superior */
    }
    
    /* SVG de icono de ubicación */
    .campus-row svg { 
      width: 16px;                   /* Ancho pequeño */
      height: 16px;                  /* Alto pequeño */
      flex-shrink: 0;                /* No se encoge */
    }
    
    /* Texto del campus */
    .campus-text { 
      font-size: 17px;               /* Tamaño mediano */
      font-weight: 600;              /* Bold */
      color: #586886;            /* Gris muy oscuro */
    }

    /* ═════════════════════════════════════════════════════════════════*/
    /* ANIMACIONES DE ENTRADA (aparecen con efecto de subida) */
    /* ═════════════════════════════════════════════════════════════════*/
    .card, .photo-wrap, .clock-box { 
      animation: fadeUp .45s ease both;  /* Ejecuta animación fadeUp */
    }
    
    /* Retrasos de animación (items aparecen en secuencia) */
    .clock-box  { animation-delay: .05s; }   /* Reloj aparece primero (50ms) */
    .photo-wrap { animation-delay: .15s; }   /* Foto aparece segundo (150ms) */
    .card       { animation-delay: .25s; }   /* Tarjeta aparece tercera (250ms) */
    
    /* Definición de la animación: sube desde abajo con fade in */
    @keyframes fadeUp {
      from { 
        opacity: 0;                  /* Comienza invisible */
        transform: translateY(14px); /* Comienza 14px más abajo */
      }
      to {
        opacity: 1;                  /* Termina visible */
        transform: translateY(0);    /* Termina en posición final */
      }
    }

    /* ═════════════════════════════════════════════════════════════════*/
    /* BANNER DE INSTALACIÓN PWA (botón para agregar a pantalla de inicio) */
    /* ═════════════════════════════════════════════════════════════════*/
    #install-banner {
      display: none;                 /* Oculto por defecto */
      position: fixed;               /* Posición fija en pantalla */
      bottom: 16px;                  /* 16px desde el fondo */
      left: 50%;                     /* Centrado horizontalmente */
      transform: translateX(-50%);   /* Centra el elemento */
      background: var(--dark);       /* Fondo gris oscuro */
      color: #fff;                   /* Texto blanco */
      padding: 12px 20px;            /* Relleno interno */
      border-radius: 14px;           /* Esquinas redondeadas */
      font-size: 14px;               /* Tamaño pequeño */
      font-weight: 600;              /* Semi-bold */
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); /* Sombra */
      cursor: pointer;               /* Cursor de mano */
      z-index: 999;                  /* Encima de todo */
      white-space: nowrap;           /* Sin salto de línea */
      gap: 10px;                     /* Espacio entre elementos */
      align-items: center;           /* Centra elementos */
    }
    
    /* Mostrar banner cuando tiene clase "show" */
    #install-banner.show { 
      display: flex;                 /* Visualiza como flexbox */
    }
  </style>
</head>
<body>
<div class="app">

  <div class="clouds">
    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="cloud c3"></div><div class="cloud c4"></div>
    <div class="cloud c5"></div>
  </div>

  <div class="app-bar">
    <button class="back-btn" onclick="history.back()" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c62828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1>TIU VIRTUAL</h1>
  </div>

  <div class="content">
    <div>
      <div class="clock-box">
        <div class="clock-time" id="clock">00:00:00</div>
      </div>
      <div class="clock-date" id="fecha"></div>

<script>
  /* ═════════════════════════════════════════════════════════════════*/
  /* DATOS DEL ALUMNO (objeto con información personal del estudiante) */
  /* ═════════════════════════════════════════════════════════════════*/
  const DATOS = {
    nombre:    "LUCIANA SAMIRA",        /* Nombre principal del alumno */
    apellido1: "MEZA",              /* Primer apellido */
    apellido2: "CALLE",          /* Segundo apellido */
    codigo:    "20241B650",           /* Código de estudiante único */
    id_banner: "N04080409",           /* ID del sistema Banner */
    carrera:   "INGENIERIA INDUSTRIAL",  /* Programa académico */
    campus:    "Campus San Miguel",  /* Ubicación del campus */
  };

  /* ═════════════════════════════════════════════════════════════════*/
  /* FUNCIÓN DE CENSURA (enmascara apellidos por privacidad) */
  /* ═════════════════════════════════════════════════════════════════*/
  /* Parámetro t: texto a censurar */
  /* Retorna: primer carácter + "***" para textos largos */
  /* Ejemplo: "PUYEN" se convierte en "P***" */
  function censurar(t) { return t.length <= 1 ? t : t[0] + "***"; }

  /* ═════════════════════════════════════════════════════════════════*/
  /* RELLENO DE ELEMENTOS DEL DOM CON DATOS DEL ALUMNO */
  /* ═════════════════════════════════════════════════════════════════*/
  /* Busca elementos HTML por su id y asigna contenido del objeto DATOS */
  
  /* Primera línea del nombre: nombre principal */
  document.getElementById("nombre-linea1").textContent = DATOS.nombre;
  
  /* Segunda línea: apellidos censurados (privacidad: P*** R***) */
  document.getElementById("nombre-linea2").textContent = censurar(DATOS.apellido1) + " " + censurar(DATOS.apellido2);
  
  /* Código de alumno (matrícula/expediente) */
  document.getElementById("codigo").textContent  = DATOS.codigo;
  
  /* ID en sistema Banner */
  document.getElementById("banner").textContent  = DATOS.id_banner;
  
  /* Carrera/programa académico */
  document.getElementById("carrera").textContent = DATOS.carrera;
  
  /* Campus (ubicación geográfica) */
  document.getElementById("campus").textContent  = DATOS.campus;

  /* ═════════════════════════════════════════════════════════════════*/
  /* ARREGLOS PARA LOCALIZACIÓN EN ESPAÑOL */
  /* ═════════════════════════════════════════════════════════════════*/
  /* Nombres de días de la semana en español (domingo=0, lunes=1, etc) */
  const DIAS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  
  /* Abreviaturas de meses en español (enero=0, febrero=1, etc) */
  const MESES = ["Ene.","Feb.","Mar.","Abr.","May.","Jun.","Jul.","Ago.","Sep.","Oct.","Nov.","Dic."];

  /* ═════════════════════════════════════════════════════════════════*/
  /* FUNCIÓN DE ACTUALIZACIÓN DE RELOJ Y FECHA (tick) */
  /* ═════════════════════════════════════════════════════════════════*/
  /* Se ejecuta cada segundo para mantener la hora actualizada en tiempo real */
  function tick() {
    /* Obtiene la fecha/hora actual del sistema operativo */
    const now = new Date();
    
    /* ACTUALIZAR DISPLAY DE HORA (HH:MM:SS) */
    /* padStart(2,"0") asegura formato de dos dígitos con cero adelante */
    /* Ejemplo: 9:5:8 se convierte en 09:05:08 */
    document.getElementById("clock").textContent =
      String(now.getHours()).padStart(2,"0")+":"+      /* Horas 00-23 */
      String(now.getMinutes()).padStart(2,"0")+":"+    /* Minutos 00-59 */
      String(now.getSeconds()).padStart(2,"0");         /* Segundos 00-59 */
    
    /* ACTUALIZAR DISPLAY DE FECHA (Día, fecha mes año) */
    /* Formato de ejemplo: "Lunes, 15 Ene. 2024" */
    document.getElementById("fecha").textContent =
      DIAS[now.getDay()]+", "+                 /* Nombre del día de la semana */
      now.getDate()+" "+                       /* Número del día (1-31) */
      MESES[now.getMonth()]+" "+               /* Abreviatura del mes */
      now.getFullYear();                       /* Año completo (ej: 2024) */
  }
  
  /* Ejecutar tick() una vez inmediatamente para mostrar hora inicial */
  tick(); 
  
  /* Ejecutar tick() cada 1000ms (1 segundo) para actualización continua */
  setInterval(tick, 1000);

  /* ═════════════════════════════════════════════════════════════════*/
  /* PWA (PROGRESSIVE WEB APP) - INSTALACIÓN EN PANTALLA DE INICIO */
  /* ═════════════════════════════════════════════════════════════════*/
  
  /* Variable para almacenar el evento defer prompts (instalación diferida) */
  let deferredPrompt;
  
  /* Obtener referencia al elemento div que contiene el banner de instalación */
  const banner = document.getElementById("install-banner");
  
  /* EVENTO: beforeinstallprompt (disparado cuando el navegador permite instalar) */
  window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredPrompt=e; banner.classList.add("show"); });
  
  /* EVENTO: click (cuando el usuario hace click en el banner para instalar) */
  banner.addEventListener("click", async () => {
    if (!deferredPrompt) return;               /* Si no hay permiso guardado, no hacer nada */
    deferredPrompt.prompt();                   /* Mostrar el diálogo nativo de instalación */
    const { outcome } = await deferredPrompt.userChoice;  /* Esperar respuesta del usuario */
    if (outcome==="accepted") banner.classList.remove("show");  /* Ocultar si aceptó */
    deferredPrompt=null;                       /* Limpiar referencia para prevenir dobles usos */
  });
  
  /* EVENTO: appinstalled (se dispara después de instalación exitosa) */
  window.addEventListener("appinstalled", () => banner.classList.remove("show"));  /* Ocultar banner después de instalar */
  
  /* ═════════════════════════════════════════════════════════════════*/
  /* SERVICE WORKER - SOPORTE OFFLINE Y MEJORA DE PERFORMANCE */
  /* ═════════════════════════════════════════════════════════════════*/
  /* Registrar el service worker si el navegador lo soporta */
  /* El service worker (sw.js) maneja cache, funcionalidad offline, etc. */
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});  /* Ignorar errores de registro */
</script>
</script>
</body>
</html>
