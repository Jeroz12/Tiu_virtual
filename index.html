<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F9FAFE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TIU Virtual" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>TIU Virtual</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --red:      #c62828;
      --dark:     #1a1a2e;
      --bg:       #F9FAFE;
      --cloud:    rgba(199, 207, 254, 0.55);
      --shadow:   rgba(0,0,0,0.12);
      --grey:     #9e9e9e;
      --navy:     #2B3945;
      --clock-bg: rgba(219, 217, 255, 0.8);
    }

    html, body {
      height: 100%;
      background: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 22px;
      position: relative;
      overflow: hidden;
    }

    /* ── Nubes de fondo ── */
    .clouds {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .cloud {
      position: absolute;
      background: var(--cloud);
      border-radius: 999px;
    }
    .c1 { width: 40px;  height: 12px; top: 210px; left: 8px; }
    .c2 { width: 60px;  height: 22px; top: 185px; right: 20px; }
    .c3 { width: 40px;  height: 12px; top: 220px; right: 80px; }
    .c4 { width: 80px;  height: 18px; top: 310px; left: -10px; opacity: .5; }
    .c5 { width: 55px;  height: 16px; top: 300px; right: -5px; opacity: .4; }

    /* ── App bar ── */
    .app-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 0;
    }
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px 4px 0;
      display: flex;
      align-items: center;
    }
    .back-btn svg { width: 20px; height: 20px; }
    .app-bar h1 {
      font-size: 17px;
      font-weight: 900;
      color: var(--dark);
      letter-spacing: .5px;
    }

    /* ── Reloj ── */
    .clock-box {
      background: var(--clock-bg);
      border-radius: 5px;
      padding: 6px 20px;
      margin: 20px 0 4px;
      box-shadow: 0 4px 5px rgba(0,0,0,0.15);
      text-align: center;
    }
    .clock-time {
      font-family: 'DM Mono', monospace;
      font-size: 46px;
      font-weight: 500;
      color: #000001;
      line-height: 1;
      letter-spacing: 2px;
    }
    .clock-date {
      font-size: 18px;
      font-weight: 500;
      color: #63666A;
      margin-top: 6px;
      text-align: center;
    }

    /* ── Foto ── */
    .photo-wrap {
      margin: 18px 0 18px;
      width: 134px;
      height: 134px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Tarjeta ── */
    .card {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 340px;
      padding: 28px;
      box-shadow: 0 8px 24px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .name-block { text-align: center; }
    .name-line {
      font-size: 26px;
      font-weight: 900;
      color: var(--red);
      line-height: 1.15;
    }

    .dato {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 3px;
    }
    .dato-label {
      font-size: 12px;
      color: var(--grey);
      font-weight: 500;
    }
    .dato-valor {
      font-size: 19px;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.2;
    }

    .carrera-text {
      font-size: 15px;
      font-weight: 900;
      color: var(--navy);
      text-align: center;
      margin-top: 10px;
    }

    .campus-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
    }
    .campus-row svg { width: 18px; height: 18px; flex-shrink: 0; }
    .campus-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    /* ── Fade-in de entrada ── */
    .card, .photo-wrap, .clock-box {
      animation: fadeUp .5s ease both;
    }
    .clock-box  { animation-delay: .05s; }
    .photo-wrap { animation-delay: .15s; }
    .card       { animation-delay: .25s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Install banner (Android Chrome) ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 999;
      white-space: nowrap;
      gap: 10px;
      align-items: center;
    }
    #install-banner.show { display: flex; }
  </style>
</head>
<body>
<div class="app">

  <!-- Nubes decorativas -->
  <div class="clouds">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
    <div class="cloud c5"></div>
  </div>

  <!-- App Bar -->
  <div class="app-bar">
    <button class="back-btn" onclick="history.back()" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c62828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1>TIU VIRTUAL</h1>
  </div>

  <!-- Reloj -->
  <div class="clock-box">
    <div class="clock-time" id="clock">00:00:00</div>
  </div>
  <div class="clock-date" id="fecha"></div>

  <!-- Nubes (zona entre reloj y foto) -->

  <!-- Foto -->
  <div class="photo-wrap">
    <img id="foto" src="https://instagram.flim8-1.fna.fbcdn.net/v/t51.82787-19/615245213_17934084957078292_6191051728506454191_n.jpg?efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby43NTAuYzIifQ&_nc_ht=instagram.flim8-1.fna.fbcdn.net&_nc_cat=104&_nc_oc=Q6cZ2gFFIoDw7Em-c9jWWMqdz6Fvjd8H5dHDUYN7qGPotd-mLVVUPPG_10UMZAZV-9myKYDvLTGp8RH4fPRjGGyCItEs&_nc_ohc=6foensv3fwAQ7kNvwHxc41r&_nc_gid=f0wmLDAUowDGhlGZBgKBeg&edm=AP4sbd4BAAAA&ccb=7-5&oh=00_AfzLIxVsS8tMu6bcbeoJrFav8g5EKV96aFrK8ht5yNQVtA&oe=69CE95E6&_nc_sid=7a9f4b"
         alt="Foto de perfil"
         onerror="this.src='https://ui-avatars.com/api/?name=GL&background=c62828&color=fff&size=134&font-size=0.4&bold=true'" />
  </div>

  <!-- Tarjeta -->
  <div class="card">
    <div class="name-block">
      <div class="name-line" id="nombre-linea1"></div>
      <div class="name-line" id="nombre-linea2"></div>
    </div>

    <div class="dato" style="margin-top:3px">
      <span class="dato-label">Código de alumno:</span>
      <span class="dato-valor" id="codigo"></span>
    </div>

    <div class="dato" style="margin-top:3px">
      <span class="dato-label">ID Banner:</span>
      <span class="dato-valor" id="banner"></span>
    </div>

    <div class="carrera-text" id="carrera"></div>

    <div class="campus-row">
      <svg viewBox="0 0 24 24" fill="#c62828"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span class="campus-text" id="campus"></span>
    </div>
  </div>

</div>

<!-- Banner de instalación -->
<div id="install-banner">
  📲 Agregar a pantalla de inicio
</div>

<script>
  // ── Datos ──────────────────────────────────────────────────────────
  const DATOS = {
    nombre:    "GLENDA LIAM",
    apellido1: "PUYEN",
    apellido2: "RODRIGUEZ",
    codigo:    "20230456",
    id_banner: "B7891234",
    carrera:   "DISEÑO GRÁFICO",
    campus:    "Campus Monterrico",
  };

  function censurar(texto) {
    if (texto.length <= 1) return texto;
    return texto[0] + "***";
  }

  // Llenar tarjeta
  document.getElementById("nombre-linea1").textContent = DATOS.nombre;
  document.getElementById("nombre-linea2").textContent =
    censurar(DATOS.apellido1) + " " + censurar(DATOS.apellido2);
  document.getElementById("codigo").textContent  = DATOS.codigo;
  document.getElementById("banner").textContent  = DATOS.id_banner;
  document.getElementById("carrera").textContent = DATOS.carrera;
  document.getElementById("campus").textContent  = DATOS.campus;

  // ── Reloj ──────────────────────────────────────────────────────────
  const DIAS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ss = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
    document.getElementById("fecha").textContent =
      `${DIAS[now.getDay()]}, ${now.getDate()} ${MESES[now.getMonth()]} ${now.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);

  // ── PWA: instalar ──────────────────────────────────────────────────
  let deferredPrompt;
  const banner = document.getElementById("install-banner");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add("show");
  });

  banner.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === "accepted") banner.classList.remove("show");
    deferredPrompt = null;
  });

  window.addEventListener("appinstalled", () => {
    banner.classList.remove("show");
  });

  // Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
