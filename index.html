<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F9FAFE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TIU Virtual" />
  <link rel="manifest" href="manifest.json" />
  <title>TIU Virtual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --red:      #c62828;
      --dark:     #1a1a2e;
      --bg:       #F9FAFE;
      --cloud:    rgba(199, 207, 254, 0.55);
      --grey:     #9e9e9e;
      --navy:     #2B3945;
      --clock-bg: rgba(219, 217, 255, 0.8);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 22px 18px;
      position: relative;
      overflow: hidden;
    }

    /* Nubes */
    .clouds { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .cloud  { position: absolute; background: var(--cloud); border-radius: 999px; }
    .c1 { width: 40px;  height: 12px; top: 210px; left: 8px; }
    .c2 { width: 60px;  height: 22px; top: 185px; right: 20px; }
    .c3 { width: 40px;  height: 12px; top: 220px; right: 80px; }
    .c4 { width: 80px;  height: 18px; top: 310px; left: -10px; opacity: .5; }
    .c5 { width: 55px;  height: 16px; top: 300px; right: -5px; opacity: .4; }

    /* App bar */
    .app-bar { width: 100%; display: flex; align-items: center; gap: 2px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 4px 6px 4px 0; display: flex; align-items: center; }
    .back-btn svg { width: 20px; height: 20px; }
    .app-bar h1 { font-size: 17px; font-weight: 900; color: var(--dark); letter-spacing: .5px; }

    /* Reloj */
    .clock-box {
      background: var(--clock-bg);
      border-radius: 5px;
      padding: 4px 14px;
      margin: 14px 0 3px;
      box-shadow: 0 4px 5px rgba(0,0,0,0.15);
      text-align: center;
      width: auto;
    }
    .clock-time {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: #000001;
      line-height: 1;
      letter-spacing: 1px;
    }
    .clock-date {
      font-size: 13px;
      font-weight: 500;
      color: #63666A;
      margin-top: 4px;
      text-align: center;
    }

    /* Foto */
    .photo-wrap {
      margin: 12px 0 12px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Tarjeta */
    .card {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 340px;
      padding: 18px 24px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .name-line {
      font-size: 18px;
      font-weight: 900;
      color: var(--red);
      line-height: 1.2;
      text-align: center;
    }

    .dato { display: flex; flex-direction: column; align-items: center; margin-top: 3px; }
    .dato-label { font-size: 11px; color: var(--grey); font-weight: 500; }
    .dato-valor { font-size: 15px; font-weight: 900; color: var(--dark); line-height: 1.2; }

    .carrera-text { font-size: 12px; font-weight: 900; color: var(--navy); text-align: center; margin-top: 8px; }

    .campus-row { display: flex; align-items: center; gap: 4px; margin-top: 8px; }
    .campus-row svg { width: 14px; height: 14px; flex-shrink: 0; }
    .campus-text { font-size: 12px; font-weight: 700; color: var(--dark); }

    /* Animaciones */
    .card, .photo-wrap, .clock-box { animation: fadeUp .5s ease both; }
    .clock-box  { animation-delay: .05s; }
    .photo-wrap { animation-delay: .15s; }
    .card       { animation-delay: .25s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Banner de instalación */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 999;
      white-space: nowrap;
      gap: 10px;
      align-items: center;
    }
    #install-banner.show { display: flex; }
  </style>
</head>

    <div class="cloud c1"></div>

    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
    <div class="cloud c5"></div>

        <polyline points="15 18 9 12 15 6"/>

    <h1>TIU VIRTUAL</h1>
  </div>

  <div class="clock-box">

    document.getElementById("clock").textContent = hh+":"+mm+":"+ss;
    document.getElementById("fecha").textContent =
      DIAS[now.getDay()]+", "+now.getDate()+" "+MESES[now.getMonth()]+" "+now.getFullYear();
  }
  tick();
  setInterval(tick, 1000);

  let deferredPrompt;
  const banner = document.getElementById("install-banner");
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault(); deferredPrompt = e; banner.classList.add("show");
  });
  banner.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === "accepted") banner.classList.remove("show");
    deferredPrompt = null;
  });
  window.addEventListener("appinstalled", () => banner.classList.remove("show"));

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
